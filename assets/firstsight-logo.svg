<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Background panel gradient (subtle, optional) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F2E"/>
      <stop offset="100%" stop-color="#0F2A3D"/>
    </linearGradient>

    <!-- Lens/eye gradient: deep navy to teal -->
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0E2A3F"/>
      <stop offset="55%" stop-color="#155F73"/>
      <stop offset="100%" stop-color="#1FB6A8"/>
    </linearGradient>

    <!-- Iris radial gradient -->
    <radialGradient id="irisGrad" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0%"  stop-color="#2DD4BF"/>
      <stop offset="55%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0B2A33"/>
    </radialGradient>

    <!-- Pulse line gradient: teal to amber accent -->
    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2DD4BF"/>
      <stop offset="45%"  stop-color="#5EEAD4"/>
      <stop offset="60%"  stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Soft glow for the pulse -->
    <filter id="pulseGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Wordmark gradient: cool to warm -->
    <linearGradient id="wordGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0E3B4D"/>
      <stop offset="65%"  stop-color="#0E3B4D"/>
      <stop offset="100%" stop-color="#0E3B4D"/>
    </linearGradient>

    <!-- Accent dot gradient -->
    <radialGradient id="accentGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>

    <!-- Clip for pulse inside lens -->
    <clipPath id="lensClip">
      <ellipse cx="200" cy="150" rx="110" ry="72"/>
    </clipPath>
  </defs>

  <!-- ============================ ICON MARK ============================ -->
  <!-- Outer eye/lens shape (almond) -->
  <g>
    <!-- Soft outer halo -->
    <ellipse cx="200" cy="150" rx="128" ry="86" fill="#0E3B4D" opacity="0.06"/>

    <!-- Lens body -->
    <ellipse cx="200" cy="150" rx="115" ry="76" fill="url(#lensGrad)"/>
    <ellipse cx="200" cy="150" rx="115" ry="76" fill="none" stroke="#0B2433" stroke-width="2.5" opacity="0.55"/>

    <!-- Inner lens highlight (top) -->
    <path d="M 110 132 Q 200 92 290 132" stroke="#7BE3D6" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round"/>

    <!-- Iris -->
    <circle cx="200" cy="150" r="46" fill="url(#irisGrad)"/>
    <!-- Iris ring detail -->
    <circle cx="200" cy="150" r="46" fill="none" stroke="#2DD4BF" stroke-width="1.2" opacity="0.45"/>
    <circle cx="200" cy="150" r="34" fill="none" stroke="#5EEAD4" stroke-width="0.8" opacity="0.35"/>

    <!-- Pupil -->
    <circle cx="200" cy="150" r="16" fill="#06141C"/>
    <!-- Catchlight (sparkle) -->
    <circle cx="208" cy="142" r="4.5" fill="#F8FAFC" opacity="0.95"/>
    <circle cx="194" cy="156" r="1.8" fill="#F8FAFC" opacity="0.7"/>

    <!-- Heartbeat / ECG pulse line crossing the lens -->
    <g clip-path="url(#lensClip)" filter="url(#pulseGlow)">
      <path d="M 78 150
               L 138 150
               L 152 150
               L 162 130
               L 175 178
               L 188 110
               L 202 188
               L 216 138
               L 230 150
               L 262 150
               L 322 150"
            stroke="url(#pulseGrad)"
            stroke-width="4.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"/>
    </g>

    <!-- Pulse line continues briefly outside lens for "first sight" speed cue -->
    <path d="M 70 150 L 85 150" stroke="#2DD4BF" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <path d="M 315 150 L 330 150" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" opacity="0.95"/>

    <!-- Amber accent dot at end of pulse — "first detection" beacon -->
    <circle cx="335" cy="150" r="6.5" fill="url(#accentGrad)"/>
    <circle cx="335" cy="150" r="11" fill="none" stroke="#F59E0B" stroke-width="1.2" opacity="0.45"/>
  </g>

  <!-- ============================ WORDMARK ============================ -->
  <!-- "FirstSight" rendered as geometric paths so no external font is needed.
       Centered around x=200, baseline ~315. Mixed case: lowercase "irst", capital S in "Sight". -->
  <g fill="#0E3B4D">
    <!-- F -->
    <path d="M55 265 h32 v10 h-22 v14 h18 v10 h-18 v26 h-10 z"/>
    <!-- i -->
    <rect x="93" y="282" width="9" height="33" rx="1.5"/>
    <circle cx="97.5" cy="271" r="4.8"/>
    <!-- r -->
    <path d="M108 282 h9 v5 c2.4 -3.5 6 -5.6 11 -5.6 v 9.6 c -6.5 0 -11 3.4 -11 9 v 15 h -9 z"/>
    <!-- s -->
    <path d="M132 305.5 c1.2 2.6 3.8 3.6 7 3.6 c2.8 0 4.6 -0.9 4.6 -2.6 c0 -1.6 -1.4 -2.4 -5.4 -3.2 c-7.4 -1.4 -11.8 -3.6 -11.8 -10 c0 -6.6 5.6 -11 13.4 -11 c6.6 0 11.4 2.6 13.6 7.6 l -7.6 3.4 c -1 -2.2 -3.2 -3.2 -6 -3.2 c -2.6 0 -4.4 1 -4.4 2.6 c0 1.6 1.6 2.4 5.6 3.2 c7.4 1.4 11.8 3.6 11.8 10 c 0 6.8 -5.8 11.2 -14 11.2 c -7 0 -12 -2.6 -14.4 -7.8 z"/>
    <!-- t -->
    <path d="M163 273 h9 v9 h7.5 v8.5 h-7.5 v12.5 c0 2.4 1.4 3.6 3.8 3.6 c1.4 0 2.6 -0.2 3.7 -0.6 v 8.5 c -1.6 0.6 -3.6 1 -6 1 c -7.6 0 -10.5 -4.2 -10.5 -10.6 v -14.4 h -5 v -8.5 h 5 z"/>

    <!-- S (capital, slightly larger to accent "Sight") -->
    <path d="M195 286 c1.6 3.4 5.2 4.8 9.6 4.8 c4 0 6.6 -1.4 6.6 -3.8 c0 -2.4 -2 -3.6 -7.6 -4.8 c-10 -2 -16 -5.2 -16 -13.4 c0 -8.8 7.6 -14.6 17.6 -14.6 c8.8 0 14.8 3.4 17.8 9.8 l -9.6 4.6 c -1.4 -3 -4.4 -4.4 -8 -4.4 c-3.6 0 -5.6 1.4 -5.6 3.6 c0 2.4 2.2 3.4 7.8 4.6 c10 2 15.8 5.2 15.8 13.4 c0 9.2 -7.8 15 -19 15 c -9.6 0 -16.4 -3.6 -19.6 -10.4 z"/>
    <!-- i -->
    <rect x="232" y="282" width="9" height="33" rx="1.5"/>
    <circle cx="236.5" cy="271" r="4.8"/>
    <!-- g -->
    <path d="M247 282 h9 v3.5 c2.2 -2.8 5.4 -4.2 9.4 -4.2 c8.4 0 14.2 6.4 14.2 16 c0 9.4 -5.8 15.8 -14.2 15.8 c -3.6 0 -6.6 -1.2 -8.8 -3.4 v 3.4 c0 4.8 3 7.4 7.6 7.4 c3.6 0 6.4 -1.4 7.4 -4 l 8.2 4 c -2.4 5.6 -8 8.8 -16 8.8 c -10.6 0 -16.8 -5.6 -16.8 -15.4 z m 16 8 c -4.2 0 -7 3 -7 7.4 c0 4.4 2.8 7.4 7 7.4 c4.2 0 7 -3 7 -7.4 c0 -4.4 -2.8 -7.4 -7 -7.4 z"/>
    <!-- h -->
    <path d="M285 263 h9 v22.5 c2.2 -2.6 5.4 -4 9.2 -4 c7.6 0 12.4 5 12.4 13 v 20.5 h -9 v -18.6 c0 -4.2 -2.4 -6.6 -6.2 -6.6 c-3.8 0 -6.4 2.6 -6.4 6.8 v 18.4 h -9 z"/>
    <!-- t -->
    <path d="M325 273 h9 v9 h7.5 v8.5 h-7.5 v12.5 c0 2.4 1.4 3.6 3.8 3.6 c1.4 0 2.6 -0.2 3.7 -0.6 v 8.5 c -1.6 0.6 -3.6 1 -6 1 c -7.6 0 -10.5 -4.2 -10.5 -10.6 v -14.4 h -5 v -8.5 h 5 z"/>
  </g>

  <!-- Amber accent under the "S" of Sight to tie wordmark to icon's beacon -->
  <rect x="187" y="332" width="42" height="3" rx="1.5" fill="url(#accentGrad)"/>

  <!-- Tagline-style underline strokes flanking the wordmark, very subtle -->
  <line x1="40"  y1="335" x2="180" y2="335" stroke="#0E3B4D" stroke-width="0.8" opacity="0.18"/>
  <line x1="236" y1="335" x2="360" y2="335" stroke="#0E3B4D" stroke-width="0.8" opacity="0.18"/>

</svg>
